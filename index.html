<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Canchas - Complejo Modular</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #171d24; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .controles-vista { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-vista {
            background-color: #2c3540; color: white; border: 1px solid #44505d;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-vista.activo { background-color: #3b82f6; border-color: #3b82f6; }

        /* Vista Cliente */
        .vista-cliente {
            background-color: #1e252d; width: 100%; max-width: 400px;
            border-radius: 12px; padding: 20px; box-sizing: border-box;
        }
        
        .calendario-strip {
            display: flex; overflow-x: auto; gap: 10px; padding-bottom: 12px; margin-bottom: 15px; border-bottom: 1px solid #2c3540;
        }
        .calendario-strip::-webkit-scrollbar { height: 6px; }
        .calendario-strip::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
        
        .dia-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-width: 65px; padding: 12px 8px; background-color: #242c36; border-radius: 10px;
            cursor: pointer; border: 1px solid transparent; transition: 0.2s;
        }
        .dia-item:hover { background-color: #2c3540; }
        .dia-item.activo { background-color: #3b82f6; border-color: #3b82f6; color: white; transform: scale(1.05); }
        .dia-nombre { font-size: 0.8em; color: #9ca3af; text-transform: uppercase; font-weight: bold;}
        .dia-item.activo .dia-nombre { color: #e5e7eb; }
        .dia-numero { font-size: 1.4em; font-weight: bold; margin-top: 4px; }
        
        .dia-cerrado { opacity: 0.3; cursor: not-allowed; }
        .dia-cerrado:hover { background-color: #242c36; }

        .sub-header { display: flex; justify-content: space-between; align-items: center; color: #9ca3af; font-size: 0.9em; padding-bottom: 10px; border-bottom: 1px solid #2c3540; margin-bottom: 10px; font-weight: bold;}
        
        #lista-horarios { max-height: 500px; overflow-y: auto; padding-right: 5px; }
        #lista-horarios::-webkit-scrollbar { width: 6px; }
        #lista-horarios::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }

        .turno-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #2c3540; cursor: pointer; transition: 0.2s; }
        .turno-item:hover { background-color: #242c36; }
        .punto-verde { height: 10px; width: 10px; background-color: #10b981; border-radius: 50%; margin-right: 15px; min-width: 10px; }
        .hora { font-weight: bold; margin-right: 8px; }
        .texto-disponible { color: #d1d5db; font-size: 0.9em; }
        .texto-sillas-disp { font-size: 0.8em; color: #10b981; margin-left: auto; font-weight: bold;}

        /* Vista Turnero */
        .vista-turnero {
            display: none; background-color: #1e252d; width: 100%; max-width: 1100px;
            border-radius: 12px; padding: 20px; box-sizing: border-box;
        }

        .contenedor-grilla {
            display: flex; overflow-x: auto; background: #1e252d; border: 1px solid #2c3540; 
            border-radius: 8px; margin-top: 15px; user-select: none;
        }
        .contenedor-grilla::-webkit-scrollbar { height: 8px; }
        .contenedor-grilla::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
        
        .tarjeta-reserva-grilla {
            /* COLOR ESTILO REFERENCIA VISUAL */
            background-color: #a7f3d0; 
            color: #064e3b; 
            border-left: 5px solid #10b981; 
            transition: 0.1s;
        }
        .tarjeta-reserva-grilla:hover { filter: brightness(1.05); z-index: 50 !important;}
        .tarjeta-reserva-grilla.fijo { background-color: #c4b5fd; border-left: 5px solid #8b5cf6; color: #2e1065;}
        
        .celda-vacia-hover { transition: background-color 0.1s; }
        .celda-vacia-hover:hover { background-color: rgba(59, 130, 246, 0.15); }

        /* Modales */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #1e252d; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; max-height: 90vh; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px; border: 1px solid #44505d; text-align: center;
        }
        .input-form {
            padding: 10px; border-radius: 6px; border: 1px solid #44505d; background-color: #171d24; 
            color: white; color-scheme: dark; font-family: inherit; width: 100%; box-sizing: border-box;
        }
        .btn-modal { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 1em; transition: 0.2s; width: 100%; box-sizing: border-box;}
        
        .btn-whatsapp { background-color: #25D366; color: #171d24; } .btn-whatsapp:hover { background-color: #1DA851; }
        .btn-guardar { background-color: #10b981; } .btn-guardar:hover { background-color: #059669; }
        .btn-fijo { background-color: #8b5cf6; color: white; } .btn-fijo:hover { background-color: #7c3aed; }
        .btn-eliminar { background-color: #ef4444; } .btn-eliminar:hover { background-color: #dc2626; }
        .btn-cerrar { background-color: #4b5563; margin-top: 10px;}

        .scroll-interno::-webkit-scrollbar { width: 6px; }
        .scroll-interno::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="controles-vista">
        <button id="btn-cliente" class="btn-vista activo" onclick="window.cambiarVista('cliente')">⚽ Vista Jugadores</button>
        <button id="btn-turnero" class="btn-vista" onclick="window.cambiarVista('turnero')">💻 Vista Turnero</button>
    </div>

    <div id="pantalla-cliente" class="vista-cliente">
        <h2 style="margin-top: 0; margin-bottom: 20px;">Reserva de Canchas</h2>
        <div id="calendario-cliente" class="calendario-strip"></div>
        <div class="sub-header">
            <span>Horarios Disponibles</span>
            <span>Complejo</span>
        </div>
        <div id="lista-horarios">Cargando horarios...</div>
    </div>

    <div id="pantalla-turnero" class="vista-turnero">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Panel de Control Modular</h2>
            <div style="display: flex; gap: 15px;">
                <button onclick="window.abrirModalMetricas()" style="background: none; border: none; font-size: 1.5em; cursor: pointer; color: #9ca3af; transition: 0.2s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='#9ca3af'" title="Métricas">📊</button>
                <button onclick="window.abrirModalConfig()" style="background: none; border: none; font-size: 1.5em; cursor: pointer; color: #9ca3af; transition: 0.2s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='#9ca3af'" title="Configuración">⚙️</button>
            </div>
        </div>
        <div id="calendario-turnero" class="calendario-strip"></div>
        <div id="lista-reservas-turnero"></div>
    </div>

    <div id="modal-reserva-cliente" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 5px;">Agendar Partido</h3>
            <p style="margin: 0; color: #9ca3af; margin-bottom: 15px;">Fecha: <strong id="reserva-fecha-display" style="color:white;"></strong> | Hora: <strong id="reserva-hora-display" style="color:white;"></strong></p>
            
            <div style="text-align: left; display: flex; flex-direction: column; gap: 12px;">
                <div>
                    <label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">Modalidad del Partido:</label>
                    <select id="select-modalidad" class="input-form" style="margin-top: 5px;" onchange="window.actualizarOpcionesCanchas()"></select>
                    <p id="mensaje-disponibilidad" style="color: #ef4444; font-size: 0.85em; font-weight: bold; margin: 5px 0 0 0; display: none;">No hay canchas disponibles para esta modalidad.</p>
                </div>
                
                <div style="display: none;">
                    <select id="select-cancha-modal" class="input-form"></select>
                </div>

                <div>
                    <label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">Nombre del Equipo / Jugador:</label>
                    <input type="text" id="input-nombre-cliente" class="input-form" placeholder="Ej: Los Pibes FC" style="margin-top: 5px;">
                </div>
                <div>
                    <label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">Teléfono (WhatsApp):</label>
                    <input type="tel" id="input-telefono-cliente" class="input-form" placeholder="Ej: 351..." style="margin-top: 5px;">
                </div>
            </div>

            <button id="btn-guardar-reserva" class="btn-modal btn-guardar" style="margin-top: 20px;" onclick="window.confirmarReservaCliente()">Confirmar Turno</button>
            <button class="btn-modal btn-cerrar" style="margin-top: 0;" onclick="window.cerrarModalReservaCliente()">Cancelar</button>
        </div>
    </div>

    <div id="modal-config" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 15px; border-bottom: 1px solid #44505d; padding-bottom: 10px;">⚙️ Configuración del Complejo</h3>
            <div style="text-align: left; display: flex; flex-direction: column; gap: 12px;">
                <div style="display: flex; gap: 10px; justify-content: space-between;">
                    <div style="flex: 1;"><label style="font-size: 0.9em; color: #d1d5db;">Abre:</label><input type="time" id="input-primer-turno" class="input-form" style="margin-top: 4px;"></div>
                    <div style="flex: 1;"><label style="font-size: 0.9em; color: #d1d5db;">Cierra:</label><input type="time" id="input-ultimo-turno" class="input-form" style="margin-top: 4px;"></div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: space-between;">
                    <div style="flex: 1;"><label style="font-size: 0.9em; color: #d1d5db;">Duración:</label>
                        <select id="input-duracion" class="input-form" style="margin-top: 4px;">
                            <option value="60">60 Min (1h)</option>
                            <option value="90">90 Min (1.5h)</option>
                            <option value="120">120 Min (2h)</option>
                        </select>
                    </div>
                    <div style="flex: 1;"><label style="font-size: 0.9em; color: #d1d5db;">Precio Base ($):</label><input type="number" id="input-precio" step="500" class="input-form" style="margin-top: 4px;"></div>
                </div>
                
                <div style="border-top: 1px solid #44505d; padding-top: 10px;">
                    <label style="font-size: 0.9em; color: #3b82f6; font-weight: bold;">Inventario de Canchas Físicas</label>
                    
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 10px;">
                        <label style="font-size: 0.85em; color: #d1d5db;">Canchas F7 (Puras):</label>
                        <input type="number" id="input-canchas-f7" min="0" max="15" class="input-form" style="width: 60px;">
                    </div>
                    
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 10px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 6px;">
                        <div>
                            <label style="font-size: 0.85em; color: #d1d5db; display: block;">Canchas F9:</label>
                            <span style="font-size: 0.7em; color: #9ca3af;">Equivale a <input type="number" id="input-equiv-f9" min="1" max="5" value="2" style="width: 30px; background: transparent; border: 1px solid #44505d; color: white; border-radius: 4px;"> F7s</span>
                        </div>
                        <input type="number" id="input-canchas-f9" min="0" max="10" class="input-form" style="width: 60px;">
                    </div>

                    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 10px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 6px;">
                        <div>
                            <label style="font-size: 0.85em; color: #d1d5db; display: block;">Canchas F11:</label>
                            <span style="font-size: 0.7em; color: #9ca3af;">Equivale a <input type="number" id="input-equiv-f11" min="1" max="5" value="3" style="width: 30px; background: transparent; border: 1px solid #44505d; color: white; border-radius: 4px;"> F7s</span>
                        </div>
                        <input type="number" id="input-canchas-f11" min="0" max="10" class="input-form" style="width: 60px;">
                    </div>
                </div>

                <div style="border-top: 1px solid #44505d; padding-top: 10px;">
                    <label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">Días Abiertos:</label>
                    <div style="display: flex; gap: 8px; justify-content: space-between; margin-top: 8px; font-size: 0.85em; color: #9ca3af;">
                        <label><input type="checkbox" class="check-dia" value="1"> Lu</label>
                        <label><input type="checkbox" class="check-dia" value="2"> Ma</label>
                        <label><input type="checkbox" class="check-dia" value="3"> Mi</label>
                        <label><input type="checkbox" class="check-dia" value="4"> Ju</label>
                        <label><input type="checkbox" class="check-dia" value="5"> Vi</label>
                        <label><input type="checkbox" class="check-dia" value="6"> Sa</label>
                        <label><input type="checkbox" class="check-dia" value="0"> Do</label>
                    </div>
                </div>
            </div>
            <button class="btn-modal btn-guardar" style="margin-top: 20px;" onclick="window.guardarConfiguracion()">Guardar Todo</button>
            <button class="btn-modal btn-cerrar" style="margin-top: 0;" onclick="window.cerrarModalConfig()">Cancelar</button>
        </div>
    </div>

    <div id="modal-metricas" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 15px; border-bottom: 1px solid #44505d; padding-bottom: 10px;">📊 Partidos Jugados</h3>
            <div id="contenido-metricas" class="scroll-interno" style="text-align: left; max-height: 350px; overflow-y: auto; padding-right: 5px;"></div>
            <button class="btn-modal btn-cerrar" style="margin-top: 15px;" onclick="window.cerrarModalMetricas()">Cerrar</button>
        </div>
    </div>

    <div id="modal-acciones" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 10px;">Gestionar Partido</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn-modal btn-fijo" onclick="window.hacerTurnoFijo()">🔄 Hacer Turno Fijo</button>
                <button class="btn-modal btn-whatsapp" onclick="window.enviarWhatsApp()">💬 Enviar WhatsApp</button>
                <button class="btn-modal btn-eliminar" onclick="window.accionEliminar()">🗑️ Cancelar Partido(s)</button>
                <button class="btn-modal btn-cerrar" onclick="window.cerrarModalAcciones()">Cerrar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAXRXx4WvjBvBWUXV-0LgOB1gOWmrVD7s4",
          authDomain: "reservas-5ec9d.firebaseapp.com",
          projectId: "reservas-5ec9d",
          storageBucket: "reservas-5ec9d.firebasestorage.app",
          messagingSenderId: "687599648901",
          appId: "1:687599648901:web:4254769ea30997745c29ec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let fechasValidas = [];
        let fechaActual = new Date();
        for (let i = 0; i <= 7; i++) {
            let f = new Date(fechaActual); f.setDate(f.getDate() + i);
            let anio = f.getFullYear(); let mes = (f.getMonth() + 1).toString().padStart(2, '0'); let dia = f.getDate().toString().padStart(2, '0');
            fechasValidas.push(`${anio}-${mes}-${dia}`); 
        }
        let fechaSeleccionada = fechasValidas[0]; 

        let primerTurno = "18:00"; 
        let ultimoTurno = "23:00";   
        let duracionGlobal = 60; 
        let precioGlobal = "15000";
        
        let cantF7 = 3; let cantF9 = 1; let cantF11 = 1;
        let equivF9 = 2; let equivF11 = 3;
        
        let diasAbiertosGlobal = [1, 2, 3, 4, 5, 6, 0]; 
        let reservasGlobales = [];
        let reservaSeleccionadaId = null; 
        let reservaEnProcesoHora = null;
        let columnasGrid = [];

        function construirColumnas() {
            columnasGrid = [];
            for(let i=1; i<=cantF7; i++) {
                columnasGrid.push({ id: `F7-${i}`, name: `F7-${i} (Pura)`, type: 'F7', parent: `F7-${i}`, index: 0 });
            }
            for(let i=1; i<=cantF9; i++) {
                for(let j=1; j<=equivF9; j++) {
                    columnasGrid.push({ id: `F9-${i}-S${j}`, name: `F9-${i} (Mitad ${j})`, type: 'F9-Sub', parent: `F9-${i}`, index: j-1 });
                }
            }
            for(let i=1; i<=cantF11; i++) {
                for(let j=1; j<=equivF11; j++) {
                    columnasGrid.push({ id: `F11-${i}-S${j}`, name: `F11-${i} (Sec ${j})`, type: 'F11-Sub', parent: `F11-${i}`, index: j-1 });
                }
            }
        }

        window.aMinutos = function(horaStr) { let [h, m] = horaStr.split(':').map(Number); return (h * 60) + m; }
        window.sumarMinutos = function(horaStr, minutosAñadir) {
            let [h, m] = horaStr.split(':').map(Number); let total = (h * 60) + m + minutosAñadir;
            let nuevaH = Math.floor(total / 60); let nuevoM = total % 60;
            if (nuevaH >= 24) nuevaH -= 24; return `${nuevaH.toString().padStart(2, '0')}:${nuevoM.toString().padStart(2, '0')}`;
        }

        const horariosBase = [];
        for (let h = 0; h <= 23; h++) { 
            let horaStr = h.toString().padStart(2, '0');
            horariosBase.push(`${horaStr}:00`); horariosBase.push(`${horaStr}:30`);
        }
        horariosBase.reverse();

        function getOcupadas(resDelDia, horaStr, duracionMin) {
            let numBloques = duracionMin / 30;
            let bloquesReq = [];
            for(let b=0; b<numBloques; b++) bloquesReq.push(window.sumarMinutos(horaStr, b * 30));
            
            let ocupadasIds = new Set();
            
            resDelDia.forEach(r => {
                let rBloques = [];
                let rDur = r.duracion || 60;
                for(let b=0; b<rDur/30; b++) rBloques.push(window.sumarMinutos(r.hora, b * 30));
                
                let hayCruce = bloquesReq.some(b => rBloques.includes(b));
                if (hayCruce) {
                    if (r.modalidad === 'F7') {
                        ocupadasIds.add(r.cancha);
                    } else if (r.modalidad === 'F9') {
                        if (r.cancha.includes('-S')) {
                            let partes = r.cancha.split('-S'); let p = partes[0]; let s = parseInt(partes[1]);
                            for(let j=0; j<equivF9; j++) ocupadasIds.add(`${p}-S${s + j}`);
                        } else {
                            for(let j=1; j<=equivF9; j++) ocupadasIds.add(`${r.cancha}-S${j}`);
                        }
                    } else if (r.modalidad === 'F11') {
                        if (r.cancha.includes('-S')) {
                            let partes = r.cancha.split('-S'); let p = partes[0]; let s = parseInt(partes[1]);
                            for(let j=0; j<equivF11; j++) ocupadasIds.add(`${p}-S${s + j}`);
                        } else {
                            for(let j=1; j<=equivF11; j++) ocupadasIds.add(`${r.cancha}-S${j}`);
                        }
                    }
                }
            });
            return ocupadasIds;
        }

        window.actualizarOpcionesCanchas = function() {
            if (!reservaEnProcesoHora) return;
            let mod = document.getElementById('select-modalidad').value;
            let resDelDia = reservasGlobales.filter(r => r.fecha === fechaSeleccionada);
            let ocupadas = getOcupadas(resDelDia, reservaEnProcesoHora, duracionGlobal);
            
            let opciones = [];
            const selectCancha = document.getElementById('select-cancha-modal');
            const btnGuardar = document.getElementById('btn-guardar-reserva');
            const msjDisp = document.getElementById('mensaje-disponibilidad');

            if (mod === 'F7') {
                let f7PurasLibres = columnasGrid.filter(c => c.type === 'F7' && !ocupadas.has(c.id));
                let subsF9Libres = columnasGrid.filter(c => c.type === 'F9-Sub' && !ocupadas.has(c.id));
                let subsF11Libres = columnasGrid.filter(c => c.type === 'F11-Sub' && !ocupadas.has(c.id));
                
                if (f7PurasLibres.length > 0) {
                    opciones = f7PurasLibres.map(c => ({ id: c.id, label: `${c.name}` }));
                } else if (subsF9Libres.length > 0) {
                    let cuentaPadres = {};
                    subsF9Libres.forEach(c => cuentaPadres[c.parent] = (cuentaPadres[c.parent] || 0) + 1);
                    subsF9Libres.sort((a, b) => cuentaPadres[a.parent] - cuentaPadres[b.parent]);
                    opciones = subsF9Libres.map(c => ({ id: c.id, label: `${c.name}` }));
                } else if (subsF11Libres.length > 0) {
                    let cuentaPadres = {};
                    subsF11Libres.forEach(c => cuentaPadres[c.parent] = (cuentaPadres[c.parent] || 0) + 1);
                    subsF11Libres.sort((a, b) => cuentaPadres[a.parent] - cuentaPadres[b.parent]);
                    opciones = subsF11Libres.map(c => ({ id: c.id, label: `${c.name}` }));
                }

            } else if (mod === 'F9') {
                let f9Completas = [];
                for(let i=1; i<=cantF9; i++) {
                    let libre = true;
                    for(let j=1; j<=equivF9; j++) { if(ocupadas.has(`F9-${i}-S${j}`)) libre = false; }
                    if(libre) f9Completas.push({ id: `F9-${i}`, label: `Cancha F9-${i}` });
                }

                let f9Adaptadas = [];
                for(let i=1; i<=cantF11; i++) {
                    let parent = `F11-${i}`;
                    let startIdx = -1;
                    for (let s=1; s <= equivF11 - equivF9 + 1; s++) {
                        let libre = true;
                        for (let j=0; j < equivF9; j++) { if (ocupadas.has(`${parent}-S${s + j}`)) libre = false; }
                        if (libre) { startIdx = s; break; } 
                    }
                    if (startIdx !== -1) {
                        let libresPadre = 0;
                        for (let s=1; s<=equivF11; s++) { if(!ocupadas.has(`${parent}-S${s}`)) libresPadre++; }
                        f9Adaptadas.push({ id: `${parent}-S${startIdx}`, label: `Cancha F11-${i}`, libres: libresPadre });
                    }
                }
                
                f9Adaptadas.sort((a,b) => a.libres - b.libres);

                if (f9Completas.length > 0) {
                    opciones = f9Completas;
                } else {
                    opciones = f9Adaptadas.map(a => ({ id: a.id, label: a.label }));
                }

            } else if (mod === 'F11') {
                for(let i=1; i<=cantF11; i++) {
                    let canchaEnteraLibre = true;
                    for(let j=1; j<=equivF11; j++) { if(ocupadas.has(`F11-${i}-S${j}`)) canchaEnteraLibre = false; }
                    if (canchaEnteraLibre) opciones.push({ id: `F11-${i}`, label: `Cancha F11-${i}` });
                }
            }

            selectCancha.innerHTML = '';
            if (opciones.length === 0) {
                btnGuardar.disabled = true; btnGuardar.style.opacity = '0.5';
                msjDisp.style.display = 'block';
            } else {
                opciones.forEach(o => selectCancha.innerHTML += `<option value="${o.id}" style="color:black;">${o.label}</option>`);
                btnGuardar.disabled = false; btnGuardar.style.opacity = '1';
                msjDisp.style.display = 'none';
            }
        }

        window.renderizarPantallas = function() {
            let fActualStr = fechaSeleccionada;
            let fSelecObj = new Date(fActualStr.split('-')[0], fActualStr.split('-')[1] - 1, fActualStr.split('-')[2]);
            let diaCerrado = !diasAbiertosGlobal.includes(fSelecObj.getDay());

            const contHorarios = document.getElementById('lista-horarios');
            const contTurnero = document.getElementById('lista-reservas-turnero');
            
            contHorarios.innerHTML = ''; contTurnero.innerHTML = '';

            if (diaCerrado) {
                contHorarios.innerHTML = `<p style="text-align:center; color:#9ca3af; margin-top:20px;">El complejo está cerrado.</p>`;
                contTurnero.innerHTML = `<p style="text-align:center; color:#9ca3af; margin-top:40px;">No hay actividad. Complejo cerrado.</p>`;
                return; 
            }

            let resDelDia = reservasGlobales.filter(r => r.fecha === fechaSeleccionada);

            // 1. VISTA CLIENTE
            const horariosFiltrados = horariosBase.filter(h => h >= primerTurno && h <= ultimoTurno);
            try {
                horariosFiltrados.forEach(hora => {
                    let ocupadas = getOcupadas(resDelDia, hora, duracionGlobal);
                    
                    let libresF7Total = columnasGrid.filter(c => !ocupadas.has(c.id)).length;
                    
                    let libresF9Completas = 0;
                    for(let i=1; i<=cantF9; i++) {
                        let ok = true; for(let j=1; j<=equivF9; j++) { if(ocupadas.has(`F9-${i}-S${j}`)) ok=false; }
                        if (ok) libresF9Completas++;
                    }
                    
                    let libresF9enF11 = 0;
                    for(let i=1; i<=cantF11; i++) {
                        for (let s=1; s <= equivF11 - equivF9 + 1; s++) {
                            let ok = true;
                            for(let j=0; j<equivF9; j++) { if(ocupadas.has(`F11-${i}-S${s + j}`)) ok=false; }
                            if (ok) { libresF9enF11++; break; } 
                        }
                    }
                    let totalF9Disponibles = libresF9Completas + libresF9enF11;
                    
                    let libresF11Completas = 0;
                    for(let i=1; i<=cantF11; i++) {
                        let ok = true; for(let j=1; j<=equivF11; j++) { if(ocupadas.has(`F11-${i}-S${j}`)) ok=false; }
                        if (ok) libresF11Completas++;
                    }

                    if (libresF7Total > 0 || totalF9Disponibles > 0 || libresF11Completas > 0) {
                        const div = document.createElement('div'); div.className = 'turno-item';
                        div.onclick = () => window.abrirModalReservaCliente(hora);
                        
                        let tags = [];
                        if (libresF11Completas > 0) tags.push(`${libresF11Completas} F11`);
                        if (totalF9Disponibles > 0) tags.push(`${totalF9Disponibles} F9`);
                        if (libresF7Total > 0) tags.push(`Total ${libresF7Total} F7`);
                        
                        div.innerHTML = `<span class="punto-verde"></span><span class="hora">${hora} hs | </span><span class="texto-disponible">Turno ${duracionGlobal/60}h</span><span class="texto-sillas-disp">${tags.join(' | ')}</span>`;
                        contHorarios.appendChild(div);
                    }
                });
            } catch(e) { console.error("Error render cliente:", e); }

            // 2. VISTA TURNERO GRILLA
            let minActual = window.aMinutos(primerTurno);
            let minFin = window.aMinutos(ultimoTurno) + duracionGlobal; 
            if (minFin <= minActual) minFin += 1440; 

            try {
                let htmlGrilla = `<div class="contenedor-grilla">`;
                
                // ALTURA DE CELDA AJUSTADA (De 40 a 30 para hacerla más compacta)
                const celdaH = 30; 

                // Columna Horas 
                htmlGrilla += `<div style="width: 55px; flex-shrink: 0; border-right: 1px solid #2c3540; background: #1e252d;">`;
                htmlGrilla += `<div style="height: ${celdaH}px; border-bottom: 1px solid #2c3540; background: #242c36;"></div>`; 
                for (let m = minActual; m < minFin; m += 30) {
                    let hStr = (m % 60 === 0) ? `${Math.floor(m / 60) % 24}:00` : '';
                    let border = (m % 60 === 0) ? 'border-bottom: 1px dashed rgba(255,255,255,0.05);' : 'border-bottom: 1px solid #2c3540;';
                    htmlGrilla += `<div style="height: ${celdaH}px; ${border} text-align: center; color: #9ca3af; font-size: 0.8em; padding-top: 3px; box-sizing: border-box;">${hStr}</div>`;
                }
                htmlGrilla += `</div>`;

                columnasGrid.forEach(col => {
                    htmlGrilla += `<div style="flex: 1; min-width: 140px; border-right: 1px solid #2c3540; position: relative;">`;
                    htmlGrilla += `<div style="height: ${celdaH}px; border-bottom: 1px solid #2c3540; text-align: center; line-height: ${celdaH}px; font-weight: bold; background: #242c36; font-size: 0.85em; color: #d1d5db; overflow: hidden; white-space: nowrap;">${col.name}</div>`;
                    
                    for (let m = minActual; m < minFin; m += 30) {
                        let hFormateada = `${(Math.floor(m / 60) % 24).toString().padStart(2,'0')}:${(m % 60).toString().padStart(2,'0')}`;
                        let border = (m % 60 === 0) ? 'border-bottom: 1px dashed rgba(255,255,255,0.05);' : 'border-bottom: 1px solid #2c3540;';
                        
                        let isOcupadoAhora = false;
                        resDelDia.forEach(r => {
                            let mI = window.aMinutos(r.hora); let mF = mI + (r.duracion || 60);
                            if (m >= mI && m < mF) {
                                if (r.modalidad === 'F7' && r.cancha === col.id) isOcupadoAhora = true;
                                if (r.modalidad === 'F9') {
                                    if (r.cancha.includes('-S') && r.cancha.split('-S')[0] === col.parent) {
                                        let startS = parseInt(r.cancha.split('-S')[1]);
                                        if (col.index + 1 >= startS && col.index + 1 < startS + equivF9) isOcupadoAhora = true;
                                    } else if (!r.cancha.includes('-S') && r.cancha === col.parent) isOcupadoAhora = true;
                                }
                                if (r.modalidad === 'F11' && r.cancha === col.parent) isOcupadoAhora = true;
                            }
                        });

                        if (!isOcupadoAhora) {
                            htmlGrilla += `<div class="celda-vacia-hover" style="height: ${celdaH}px; ${border} box-sizing: border-box; cursor: pointer;" onclick="window.abrirModalReservaCliente('${hFormateada}')"></div>`;
                        } else {
                            htmlGrilla += `<div style="height: ${celdaH}px; ${border} box-sizing: border-box;"></div>`;
                        }
                    }

                    // Renderizar Tarjetas
                    let resQueEmpiezanAqui = resDelDia.filter(r => {
                        if (r.modalidad === 'F7' && r.cancha === col.id) return true;
                        if (r.modalidad === 'F9') {
                            if (r.cancha.includes('-S') && r.cancha === col.id) return true; 
                            if (!r.cancha.includes('-S') && r.cancha === col.parent && col.index === 0) return true; 
                        }
                        if (r.modalidad === 'F11' && r.cancha === col.parent && col.index === 0) return true;
                        return false;
                    });

                    resQueEmpiezanAqui.forEach(res => {
                        let minRes = window.aMinutos(res.hora); if (minRes < minActual && minFin > 1440) minRes += 1440;
                        
                        // Cálculo de offset y altura según el nuevo celdaH
                        let offsetTop = ((minRes - minActual) / 30) * celdaH + celdaH; 
                        let rDur = res.duracion || 60;
                        let height = (rDur / 30) * celdaH; 
                        
                        let spanCol = 1;
                        if (res.modalidad === 'F9') spanCol = equivF9;
                        if (res.modalidad === 'F11') spanCol = equivF11;
                        
                        let cardWidth = `calc(${spanCol * 100}% + ${spanCol - 1}px - 8px)`; 
                        
                        let eClass = res.esFijo ? "fijo" : "";
                        // Colores: Texto oscuro por defecto, morado si es fijo
                        let cTxt = res.esFijo ? "#2e1065" : "#064e3b";
                        let bgTag = res.esFijo ? "rgba(0,0,0,0.15)" : "rgba(0,0,0,0.15)";
                        
                        htmlGrilla += `
                            <div class="tarjeta-reserva-grilla ${eClass}" onclick="window.abrirModal('${res.id}')" 
                                 style="position: absolute; top: ${offsetTop}px; left: 4px; width: ${cardWidth}; height: ${height - 4}px; 
                                        padding: 6px 8px; font-size: 0.8em; overflow: hidden; border-radius: 6px; cursor: pointer; box-shadow: 0 3px 5px rgba(0,0,0,0.2); display: flex; flex-direction: column; justify-content: space-between; z-index: 10;">
                                <div style="display: flex; justify-content: space-between; align-items: flex-start; line-height: 1;">
                                    <span style="font-weight: 900; font-size: 1.15em; color: ${cTxt}; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${res.jugador}</span>
                                    <span style="background: ${bgTag}; padding: 2px 5px; border-radius: 4px; font-weight: bold; font-size: 0.75em; color: ${cTxt};">${res.modalidad}</span>
                                </div>
                                <span style="color: ${cTxt}; opacity: 0.9; font-weight: 800; font-size: 0.95em; line-height: 1;">${res.hora} hs ${res.esFijo ? '🔄' : ''}</span>
                                <span style="margin-top: auto; font-size: 0.9em; font-weight: 700; color: ${cTxt}; opacity: 0.85; line-height: 1; display: flex; align-items: center; gap: 4px;">
                                    <span>📱</span> ${res.telefono || 'Sin tel'}
                                </span>
                            </div>
                        `;
                    });
                    
                    htmlGrilla += `</div>`; 
                });

                htmlGrilla += `</div>`;
                contTurnero.innerHTML = htmlGrilla;

            } catch(e) { console.error("Error render turnero:", e); }
        }

        function calcularMetricas() {
            const m = {}; const n = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            reservasGlobales.forEach(r => {
                if(!r.fecha) return; let p = r.fecha.split('-'); let txt = `${n[parseInt(p[1])-1]} ${p[0]}`;
                if(!m[txt]) m[txt] = { t: 0 }; m[txt].t++;
            });
            let html = ""; let k = Object.keys(m);
            if(k.length===0){ document.getElementById('contenido-metricas').innerHTML = "<p style='color:#9ca3af; text-align:center;'>Aún no hay partidos.</p>"; return; }
            k.sort().reverse().forEach(mes => {
                html += `<div style="background:#242c36; padding:15px; border-radius:8px; margin-bottom:15px; border: 1px solid #2c3540;">
                            <h4 style="margin:0 0 10px 0; color:#3b82f6; border-bottom:1px solid #44505d; padding-bottom:8px;">📅 ${mes}</h4>
                            <div style="text-align: center; background: #171d24; padding: 10px; border-radius: 6px;">
                                <div style="font-size: 1.8em; font-weight: bold; color: #10b981;">${m[mes].t}</div>
                                <div style="font-size: 0.9em; color: #9ca3af;">Partidos Totales</div>
                            </div></div>`;
            });
            document.getElementById('contenido-metricas').innerHTML = html;
        }

        window.hacerTurnoFijo = async function() {
            if(!reservaSeleccionadaId) return;
            const resO = reservasGlobales.find(r => r.id === reservaSeleccionadaId); if(!resO) return;

            if (resO.esFijo) { alert("Este partido ya pertenece a un turno fijo."); return; }

            if (!confirm("¿Convertir en TURNO FIJO?\n\nEl sistema reservará automáticamente esta misma cancha y horario para las próximas 52 semanas.")) return;

            try {
                let idG = "FIJO-" + Date.now();
                await updateDoc(doc(db, "reservas", reservaSeleccionadaId), { esFijo: true, grupoFijoId: idG });
                
                let p = []; let fB = new Date(`${resO.fecha}T12:00:00`); 
                for(let i=1; i<=52; i++) {
                    let fT = new Date(fB); fT.setDate(fT.getDate() + (i * 7));
                    let fISO = `${fT.getFullYear()}-${(fT.getMonth()+1).toString().padStart(2,'0')}-${fT.getDate().toString().padStart(2,'0')}`;
                    p.push(addDoc(collection(db, "reservas"), { 
                        ...resO, id: undefined, fecha: fISO, fechaRegistro: new Date(), esFijo: true, grupoFijoId: idG 
                    }));
                }
                await Promise.all(p); 
                alert(`¡Turno Fijo establecido exitosamente!`); 
                window.cerrarModalAcciones();
            } catch (e) { alert("Error al establecer fijo."); }
        }

        window.accionEliminar = async function() { 
            if(!reservaSeleccionadaId) return;
            const res = reservasGlobales.find(r => r.id === reservaSeleccionadaId);
            if(!res) return;

            if (res.esFijo && res.grupoFijoId) {
                let accion = confirm("Este es un TURNO FIJO.\n\n[ACEPTAR] para eliminar TODO el turno fijo desde esta fecha en adelante.\n[CANCELAR] para eliminar SOLO el partido de esta semana.");
                if (accion) {
                    let futuros = reservasGlobales.filter(r => r.grupoFijoId === res.grupoFijoId && r.fecha >= res.fecha);
                    if (confirm(`Se eliminarán permanentemente ${futuros.length} partidos. ¿Continuar?`)) {
                        let promesas = futuros.map(f => deleteDoc(doc(db, "reservas", f.id)));
                        await Promise.all(promesas);
                        window.cerrarModalAcciones();
                    }
                } else {
                    if (confirm("¿Borrar solo este partido específico?")) {
                        await deleteDoc(doc(db, "reservas", reservaSeleccionadaId));

                    }

            } else {
                if(confirm("¿Cancelar este partido?")) { 
                    await deleteDoc(doc(db, "reservas", reservaSeleccionadaId)); 
                    window.cerrarModalAcciones(); 
                }
            }

        onSnapshot(doc(db, "configuracion", "turnero"), (docSnap) => {
            if (docSnap.exists()) {
                let d = docSnap.data();
                primerTurno = d.primerTurno || "18:00"; ultimoTurno = d.ultimoTurno || "23:00"; duracionGlobal = d.duracionTurno || 60;
                precioGlobal = d.precioTurno || "15000"; // Lectura del precio
                cantF7 = d.canchasF7 !== undefined ? d.canchasF7 : 3; cantF9 = d.canchasF9 !== undefined ? d.canchasF9 : 1; cantF11 = d.canchasF11 !== undefined ? d.canchasF11 : 1;
                equivF9 = d.equivF9 || 2; equivF11 = d.equivF11 || 3;
                diasAbiertosGlobal = d.diasAbiertos || [1, 2, 3, 4, 5, 6, 0];
                
                document.getElementById('input-primer-turno').value = primerTurno; document.getElementById('input-ultimo-turno').value = ultimoTurno;
                document.getElementById('input-duracion').value = duracionGlobal;
                document.getElementById('input-precio').value = precioGlobal; // Reflejar precio en UI
                document.getElementById('input-canchas-f7').value = cantF7; document.getElementById('input-canchas-f9').value = cantF9; document.getElementById('input-canchas-f11').value = cantF11;
                document.getElementById('input-equiv-f9').value = equivF9; document.getElementById('input-equiv-f11').value = equivF11;
                document.querySelectorAll('.check-dia').forEach(cb => cb.checked = diasAbiertosGlobal.includes(parseInt(cb.value)));
            }
            construirColumnas();
            
            let fA = new Date(fechaSeleccionada.split('-')[0], fechaSeleccionada.split('-')[1] - 1, fechaSeleccionada.split('-')[2]);
            if (!diasAbiertosGlobal.includes(fA.getDay())) {
                let prox = fechasValidas.find(f => diasAbiertosGlobal.includes(new Date(f.split('-')[0], f.split('-')[1]-1, f.split('-')[2]).getDay()));
                if(prox) fechaSeleccionada = prox;
            }
            renderizarCalendarios(); renderizarPantallas(); 
        });

        onSnapshot(collection(db, "reservas"), (snap) => {
            reservasGlobales = []; snap.forEach(d => reservasGlobales.push({ id: d.id, ...d.data() }));
            renderizarPantallas(); 
        });

    </script>
