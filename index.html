<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Canchas</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #171d24; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .controles-vista { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-vista {
            background-color: #2c3540; color: white; border: 1px solid #44505d;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-vista.activo { background-color: #3b82f6; border-color: #3b82f6; }

        /* Vista Cliente/Jugador */
        .vista-cliente {
            background-color: #1e252d; width: 100%; max-width: 400px;
            border-radius: 12px; padding: 20px; box-sizing: border-box;
        }
        
        .calendario-strip {
            display: flex; overflow-x: auto; gap: 10px; padding-bottom: 12px; margin-bottom: 15px; border-bottom: 1px solid #2c3540;
        }
        .calendario-strip::-webkit-scrollbar { height: 6px; }
        .calendario-strip::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
        
        .dia-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-width: 65px; padding: 12px 8px; background-color: #242c36; border-radius: 10px;
            cursor: pointer; border: 1px solid transparent; transition: 0.2s;
        }
        .dia-item:hover { background-color: #2c3540; }
        .dia-item.activo { background-color: #3b82f6; border-color: #3b82f6; color: white; transform: scale(1.05); }
        .dia-nombre { font-size: 0.8em; color: #9ca3af; text-transform: uppercase; font-weight: bold;}
        .dia-item.activo .dia-nombre { color: #e5e7eb; }
        .dia-numero { font-size: 1.4em; font-weight: bold; margin-top: 4px; }
        
        /* Estilo para días cerrados */
        .dia-cerrado { opacity: 0.3; cursor: not-allowed; }
        .dia-cerrado:hover { background-color: #242c36; }

        .sub-header { display: flex; justify-content: space-between; align-items: center; color: #9ca3af; font-size: 0.9em; padding-bottom: 10px; border-bottom: 1px solid #2c3540; margin-bottom: 10px; font-weight: bold;}
        
        #lista-horarios { max-height: 500px; overflow-y: auto; padding-right: 5px; }
        #lista-horarios::-webkit-scrollbar { width: 6px; }
        #lista-horarios::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }

        .turno-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #2c3540; cursor: pointer; transition: 0.2s; }
        .turno-item:hover { background-color: #242c36; }
        .punto-verde { height: 10px; width: 10px; background-color: #10b981; border-radius: 50%; margin-right: 15px; min-width: 10px; }
        .hora { font-weight: bold; margin-right: 8px; }
        .texto-disponible { color: #d1d5db; font-size: 0.9em; }
        .texto-sillas-disp { font-size: 0.8em; color: #10b981; margin-left: auto; font-weight: bold;}

        /* Vista Turnero */
        .vista-turnero {
            display: none; background-color: #1e252d; width: 100%; max-width: 900px;
            border-radius: 12px; padding: 20px; box-sizing: border-box;
        }

        .contenedor-grilla {
            display: flex; overflow-x: auto; background: #1e252d; border: 1px solid #2c3540; 
            border-radius: 8px; margin-top: 15px; user-select: none;
        }
        .contenedor-grilla::-webkit-scrollbar { height: 8px; }
        .contenedor-grilla::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
        
        .tarjeta-reserva-grilla {
            background-color: #f6a74b; color: #171d24; border-left: 5px solid #d97706; transition: 0.1s;
        }
        .tarjeta-reserva-grilla:hover { filter: brightness(1.1); }
        .tarjeta-reserva-grilla.asistio { background-color: #3b82f6; color: #ffffff; border-left: 5px solid #1d4ed8; }
        
        .celda-vacia-hover { transition: background-color 0.1s; }
        .celda-vacia-hover:hover { background-color: rgba(59, 130, 246, 0.15); }

        .mensaje-vacio { color: #9ca3af; text-align: center; margin-top: 20px; width: 100%; }

        /* Modales */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #1e252d; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px;
            display: flex; flex-direction: column; gap: 12px; border: 1px solid #44505d; text-align: center;
        }
        .input-form {
            padding: 10px; border-radius: 6px; border: 1px solid #44505d; background-color: #171d24; 
            color: white; color-scheme: dark; font-family: inherit; width: 100%; box-sizing: border-box;
        }
        .btn-modal { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 1em; transition: 0.2s; width: 100%; box-sizing: border-box;}
        
        .btn-whatsapp { background-color: #25D366; color: #171d24; } .btn-whatsapp:hover { background-color: #1DA851; }
        .btn-guardar { background-color: #10b981; } .btn-guardar:hover { background-color: #059669; }
        .btn-asistencia { background-color: #3b82f6; } .btn-asistencia:hover { background-color: #2563eb; }
        .btn-eliminar { background-color: #ef4444; } .btn-eliminar:hover { background-color: #dc2626; }
        .btn-cerrar { background-color: #4b5563; margin-top: 10px;}

        .scroll-interno::-webkit-scrollbar { width: 6px; }
        .scroll-interno::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="controles-vista">
        <button id="btn-cliente" class="btn-vista activo" onclick="window.cambiarVista('cliente')">⚽ Vista Jugadores</button>
        <button id="btn-turnero" class="btn-vista" onclick="window.cambiarVista('turnero')">💻 Vista Turnero</button>
    </div>

    <div id="pantalla-cliente" class="vista-cliente">
        <h2 style="margin-top: 0; margin-bottom: 20px;">Reserva de Canchas</h2>
        <div id="calendario-cliente" class="calendario-strip"></div>
        <div class="sub-header">
            <span>Horarios Disponibles</span>
            <span>Complejo</span>
        </div>
        <div id="lista-horarios">Cargando horarios...</div>
    </div>

    <div id="pantalla-turnero" class="vista-turnero">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Panel de Control de Canchas</h2>
            <div style="display: flex; gap: 15px;">
                <button onclick="window.abrirModalMetricas()" style="background: none; border: none; font-size: 1.5em; cursor: pointer; color: #9ca3af; transition: 0.2s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='#9ca3af'" title="Métricas">📊</button>
                <button onclick="window.abrirModalConfig()" style="background: none; border: none; font-size: 1.5em; cursor: pointer; color: #9ca3af; transition: 0.2s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='#9ca3af'" title="Configuración">⚙️</button>
            </div>
        </div>
        <div id="calendario-turnero" class="calendario-strip"></div>
        <div id="lista-reservas-turnero"></div>
    </div>

    <div id="modal-reserva-cliente" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 5px;">Crear Turno Fijo</h3>
            <p style="margin: 0; color: #9ca3af; margin-bottom: 15px;">Inicia: <strong id="reserva-fecha-display" style="color:white;"></strong> | Hora: <strong id="reserva-hora-display" style="color:white;"></strong></p>
            
            <div style="text-align: left; display: flex; flex-direction: column; gap: 12px;">
                <div>
                    <label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">Modalidad del Partido:</label>
                    <select id="select-modalidad" class="input-form" style="margin-top: 5px;" onchange="window.actualizarOpcionesCanchas()">
                        <option value="F7">Fútbol 7 (Ocupa 1 cancha)</option>
                        <option value="F9">Fútbol 9</option>
                        <option value="F11">Fútbol 11</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">Elige tu Cancha Base:</label>
                    <select id="select-cancha-modal" class="input-form" style="margin-top: 5px;"></select>
                </div>
                <div>
                    <label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">Semanas a repetir (Turno Fijo):</label>
                    <input type="number" id="input-semanas-fijo" class="input-form" value="4" min="1" max="52" style="margin-top: 5px;">
                </div>
                <div>
                    <label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">Nombre del Equipo / Jugador:</label>
                    <input type="text" id="input-nombre-cliente" class="input-form" placeholder="Ej: Los Pibes FC" style="margin-top: 5px;">
                </div>
                <div>
                    <label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">Teléfono (WhatsApp):</label>
                    <input type="tel" id="input-telefono-cliente" class="input-form" placeholder="Ej: 351..." style="margin-top: 5px;">
                </div>
            </div>

            <button id="btn-guardar-reserva" class="btn-modal btn-guardar" style="margin-top: 20px;" onclick="window.confirmarReservaCliente()">Confirmar Turno Fijo</button>
            <button class="btn-modal btn-cerrar" style="margin-top: 0;" onclick="window.cerrarModalReservaCliente()">Cancelar</button>
        </div>
    </div>

    <div id="modal-config" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 15px; border-bottom: 1px solid #44505d; padding-bottom: 10px;">⚙️ Configuración del Complejo</h3>
            <div style="text-align: left; display: flex; flex-direction: column; gap: 12px;">
                <div style="display: flex; gap: 10px; justify-content: space-between;">
                    <div style="flex: 1;"><label style="font-size: 0.9em; color: #d1d5db;">Primer Turno:</label><input type="time" id="input-primer-turno" class="input-form" style="margin-top: 4px;"></div>
                    <div style="flex: 1;"><label style="font-size: 0.9em; color: #d1d5db;">Último Turno:</label><input type="time" id="input-ultimo-turno" class="input-form" style="margin-top: 4px;"></div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: space-between;">
                    <div style="flex: 1;"><label style="font-size: 0.9em; color: #d1d5db;">Precio Base ($):</label><input type="number" id="input-precio" step="500" class="input-form" style="margin-top: 4px;"></div>
                    <div style="flex: 1;"><label style="font-size: 0.9em; color: #d1d5db;">Canchas (F7):</label><input type="number" id="input-canchas" min="1" max="20" class="input-form" style="margin-top: 4px;" title="Total de canchas base"></div>
                </div>
                <div>
                    <label style="font-size: 0.9em; color: #d1d5db;">Duración Standard:</label>
                    <select id="input-duracion" class="input-form" style="margin-top: 4px;">
                        <option value="60">60 Minutos (1h)</option>
                        <option value="90">90 Minutos (1.5h)</option>
                        <option value="120">120 Minutos (2h)</option>
                    </select>
                </div>
                <div style="border-top: 1px solid #44505d; padding-top: 10px;">
                    <label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">Equivalencias Modulares (Canchas F7):</label>
                    <div style="display: flex; gap: 10px; justify-content: space-between; margin-top: 8px;">
                        <div style="flex: 1;"><label style="font-size: 0.85em; color: #9ca3af;">Para un F9:</label><input type="number" id="input-equiv-f9" min="1" max="5" class="input-form" style="margin-top: 4px;"></div>
                        <div style="flex: 1;"><label style="font-size: 0.85em; color: #9ca3af;">Para un F11:</label><input type="number" id="input-equiv-f11" min="1" max="5" class="input-form" style="margin-top: 4px;"></div>
                    </div>
                </div>
                <div style="border-top: 1px solid #44505d; padding-top: 10px;">
                    <label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">Días Abiertos:</label>
                    <div style="display: flex; gap: 8px; justify-content: space-between; margin-top: 8px; font-size: 0.85em; color: #9ca3af;">
                        <label><input type="checkbox" class="check-dia" value="1"> Lu</label>
                        <label><input type="checkbox" class="check-dia" value="2"> Ma</label>
                        <label><input type="checkbox" class="check-dia" value="3"> Mi</label>
                        <label><input type="checkbox" class="check-dia" value="4"> Ju</label>
                        <label><input type="checkbox" class="check-dia" value="5"> Vi</label>
                        <label><input type="checkbox" class="check-dia" value="6"> Sa</label>
                        <label><input type="checkbox" class="check-dia" value="0"> Do</label>
                    </div>
                </div>
            </div>
            <button class="btn-modal btn-guardar" style="margin-top: 20px;" onclick="window.guardarConfiguracion()">Guardar Todo</button>
            <button class="btn-modal btn-cerrar" style="margin-top: 0;" onclick="window.cerrarModalConfig()">Cancelar</button>
        </div>
    </div>

    <div id="modal-metricas" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 15px; border-bottom: 1px solid #44505d; padding-bottom: 10px;">📊 Partidos Jugados</h3>
            <div id="contenido-metricas" class="scroll-interno" style="text-align: left; max-height: 350px; overflow-y: auto; padding-right: 5px;"></div>
            <button class="btn-modal btn-cerrar" style="margin-top: 15px;" onclick="window.cerrarModalMetricas()">Cerrar</button>
        </div>
    </div>

    <div id="modal-acciones" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 10px;">Gestionar Partido</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn-modal btn-asistencia" onclick="window.accionAsistencia()">✔️ Confirmar Llegada</button>
                <button class="btn-modal btn-whatsapp" onclick="window.enviarWhatsApp()">💬 Enviar WhatsApp</button>
                <button class="btn-modal btn-eliminar" onclick="window.accionEliminar()">🗑️ Cancelar este Partido</button>
                <button class="btn-modal btn-cerrar" onclick="window.cerrarModalAcciones()">Cerrar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAXRXx4WvjBvBWUXV-0LgOB1gOWmrVD7s4",
          authDomain: "reservas-5ec9d.firebaseapp.com",
          projectId: "reservas-5ec9d",
          storageBucket: "reservas-5ec9d.firebasestorage.app",
          messagingSenderId: "687599648901",
          appId: "1:687599648901:web:4254769ea30997745c29ec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let fechasValidas = [];
        let fechaActual = new Date();
        for (let i = 0; i <= 7; i++) {
            let f = new Date(fechaActual);
            f.setDate(f.getDate() + i);
            let anio = f.getFullYear();
            let mes = (f.getMonth() + 1).toString().padStart(2, '0');
            let dia = f.getDate().toString().padStart(2, '0');
            fechasValidas.push(`${anio}-${mes}-${dia}`); 
        }
        let fechaSeleccionada = fechasValidas[0]; 

        let primerTurno = "18:00"; 
        let ultimoTurno = "23:00";   
        let precioGlobal = "15000"; 
        let cantidadCanchasGlobal = 3; 
        let duracionGlobal = 60; 
        let equivF9Global = 2; 
        let equivF11Global = 3; 
        let diasAbiertosGlobal = [1, 2, 3, 4, 5, 6, 0]; // 0=Dom, 1=Lun... Por defecto abre todos
        let reservasGlobales = [];
        let reservaSeleccionadaId = null; 
        let reservaEnProcesoHora = null;

        function renderizarCalendarios() {
            const calCliente = document.getElementById('calendario-cliente');
            const calTurnero = document.getElementById('calendario-turnero');
            calCliente.innerHTML = ''; calTurnero.innerHTML = '';
            const diasCortos = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];

            fechasValidas.forEach((fechaISO, index) => {
                const partes = fechaISO.split('-');
                const f = new Date(partes[0], partes[1] - 1, partes[2]);
                const nombreDia = index === 0 ? 'HOY' : diasCortos[f.getDay()];
                const numeroDia = f.getDate().toString().padStart(2, '0');
                
                const esActivo = fechaISO === fechaSeleccionada ? 'activo' : '';
                const esCerrado = !diasAbiertosGlobal.includes(f.getDay());
                const claseCerrado = esCerrado ? 'dia-cerrado' : '';
                const onclickAttr = esCerrado ? '' : `onclick="window.seleccionarFecha('${fechaISO}')"`;

                const htmlDia = `<div class="dia-item ${esActivo} ${claseCerrado}" ${onclickAttr} title="${esCerrado ? 'Cerrado' : ''}">
                                    <span class="dia-nombre">${nombreDia}</span>
                                    <span class="dia-numero">${numeroDia}</span>
                                 </div>`;
                calCliente.innerHTML += htmlDia;
                calTurnero.innerHTML += htmlDia;
            });
        }

        window.seleccionarFecha = function(fechaISO) {
            fechaSeleccionada = fechaISO;
            renderizarCalendarios(); renderizarPantallas();   
        }

        const horariosBase = [];
        for (let h = 0; h <= 23; h++) { 
            let horaStr = h.toString().padStart(2, '0');
            horariosBase.push(`${horaStr}:00`); horariosBase.push(`${horaStr}:30`);
        }
        horariosBase.reverse(); 

        window.aMinutos = function(horaStr) { let [h, m] = horaStr.split(':').map(Number); return (h * 60) + m; }
        window.sumarMinutos = function(horaStr, minutosAñadir) {
            let [h, m] = horaStr.split(':').map(Number); let total = (h * 60) + m + minutosAñadir;
            let nuevaH = Math.floor(total / 60); let nuevoM = total % 60;
            if (nuevaH >= 24) nuevaH -= 24; return `${nuevaH.toString().padStart(2, '0')}:${nuevoM.toString().padStart(2, '0')}`;
        }

        window.cambiarVista = function(vista) {
            document.getElementById('pantalla-cliente').style.display = vista === 'cliente' ? 'block' : 'none';
            document.getElementById('pantalla-turnero').style.display = vista === 'turnero' ? 'block' : 'none';
            document.getElementById('btn-cliente').classList.toggle('activo', vista === 'cliente');
            document.getElementById('btn-turnero').classList.toggle('activo', vista === 'turnero');
        }

        window.abrirModalConfig = function() { document.getElementById('modal-config').style.display = 'flex'; }
        window.cerrarModalConfig = function() { document.getElementById('modal-config').style.display = 'none'; }
        
        window.abrirModal = function(id) { 
            reservaSeleccionadaId = id; 
            document.getElementById('modal-acciones').style.display = 'flex'; 
        }
        window.cerrarModalAcciones = function() { reservaSeleccionadaId = null; document.getElementById('modal-acciones').style.display = 'none'; }

        window.abrirModalMetricas = function() {
            calcularMetricas();
            document.getElementById('modal-metricas').style.display = 'flex';
        }
        window.cerrarModalMetricas = function() { document.getElementById('modal-metricas').style.display = 'none'; }

        function calcularMetricas() {
            const metricas = {}; 
            const mesesNombres = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

            reservasGlobales.forEach(r => {
                if(!r.fecha) return;
                const partes = r.fecha.split('-'); 
                const anio = partes[0];
                const mesNum = parseInt(partes[1], 10);
                const mesTexto = `${mesesNombres[mesNum - 1]} ${anio}`;

                if(!metricas[mesTexto]) { metricas[mesTexto] = { total: 0 }; }
                metricas[mesTexto].total++;
            });

            const contenedor = document.getElementById('contenido-metricas');
            let html = "";
            const mesesKeys = Object.keys(metricas);
            if(mesesKeys.length === 0) {
                contenedor.innerHTML = "<p style='color:#9ca3af; text-align:center;'>Aún no hay partidos registrados.</p>"; return;
            }

            mesesKeys.sort().reverse().forEach(mes => {
                html += `<div style="background:#242c36; padding:15px; border-radius:8px; margin-bottom:15px; border: 1px solid #2c3540;">`;
                html += `<h4 style="margin:0 0 10px 0; color:#3b82f6; border-bottom:1px solid #44505d; padding-bottom:8px;">📅 ${mes}</h4>`;
                html += `<div style="text-align: center; background: #171d24; padding: 10px; border-radius: 6px;">
                            <div style="font-size: 1.8em; font-weight: bold; color: #10b981;">${metricas[mes].total}</div>
                            <div style="font-size: 0.9em; color: #9ca3af;">Partidos Totales</div>
                         </div></div>`;
            });
            contenedor.innerHTML = html;
        }

        window.actualizarOpcionesCanchas = function() {
            if (!reservaEnProcesoHora) return;
            
            const modalidad = document.getElementById('select-modalidad').value;
            const numCanchasNecesarias = modalidad === 'F11' ? equivF11Global : (modalidad === 'F9' ? equivF9Global : 1);
            
            const numBloquesNuevo = duracionGlobal / 30;
            let bloquesNuevos = [];
            for(let b=0; b < numBloquesNuevo; b++) { bloquesNuevos.push(window.sumarMinutos(reservaEnProcesoHora, b * 30)); }

            let canchasOcupadas = new Set();
            
            reservasGlobales.forEach(r => {
                if ((r.fecha || fechasValidas[0]) === fechaSeleccionada) {
                    let resDuracion = r.duracion || 60;
                    let numBloquesRes = resDuracion / 30;
                    let bloquesRes = [];
                    for(let b=0; b < numBloquesRes; b++) { bloquesRes.push(window.sumarMinutos(r.hora, b * 30)); }
                    
                    if(bloquesNuevos.some(b => bloquesRes.includes(b))) {
                        let baseCancha = parseInt(r.cancha || "1");
                        let cNecesarias = r.modalidad === 'F11' ? equivF11Global : (r.modalidad === 'F9' ? equivF9Global : 1);
                        for(let i=0; i<cNecesarias; i++) canchasOcupadas.add(baseCancha + i);
                    }
                }
            });

            const selectCancha = document.getElementById('select-cancha-modal');
            selectCancha.innerHTML = '';
            let opcionesValidas = 0;

            for(let c = 1; c <= cantidadCanchasGlobal; c++) {
                let espacioSuficiente = true;
                for(let i=0; i<numCanchasNecesarias; i++) {
                    if ((c + i) > cantidadCanchasGlobal || canchasOcupadas.has(c + i)) {
                        espacioSuficiente = false; break;
                    }
                }
                if(espacioSuficiente) { 
                    selectCancha.innerHTML += `<option value="${c}" style="color: black;">Cancha ${c}</option>`; 
                    opcionesValidas++;
                }
            }

            const btnGuardar = document.getElementById('btn-guardar-reserva');
            if (opcionesValidas === 0) {
                selectCancha.innerHTML = `<option value="">Sin espacio para ${modalidad}</option>`;
                btnGuardar.disabled = true; btnGuardar.style.opacity = '0.5';
            } else {
                btnGuardar.disabled = false; btnGuardar.style.opacity = '1';
            }
        }

        window.abrirModalReservaCliente = function(hora) {
            let minInicio = window.aMinutos(hora);
            let minUltimo = window.aMinutos(ultimoTurno);
            if (minInicio > minUltimo) { alert("Este horario supera el límite del complejo."); return; }

            reservaEnProcesoHora = hora;
            const partes = fechaSeleccionada.split('-');
            const f = new Date(partes[0], partes[1] - 1, partes[2]);
            document.getElementById('reserva-fecha-display').innerText = `${f.getDate()}/${f.getMonth() + 1}/${f.getFullYear()}`;
            document.getElementById('reserva-hora-display').innerText = `${hora} hs (${duracionGlobal/60}h)`;

            document.getElementById('select-modalidad').value = 'F7'; 
            window.actualizarOpcionesCanchas();

            document.getElementById('input-nombre-cliente').value = ""; 
            document.getElementById('input-telefono-cliente').value = ""; 
            document.getElementById('input-semanas-fijo').value = "4"; 
            document.getElementById('modal-reserva-cliente').style.display = 'flex';
        }

        window.cerrarModalReservaCliente = function() { reservaEnProcesoHora = null; document.getElementById('modal-reserva-cliente').style.display = 'none'; }

        window.confirmarReservaCliente = async function() {
            const inputNombre = document.getElementById('input-nombre-cliente').value;
            const inputTelefono = document.getElementById('input-telefono-cliente').value;
            const selectCanchaModal = document.getElementById('select-cancha-modal').value;
            const modalidad = document.getElementById('select-modalidad').value;
            let semanas = parseInt(document.getElementById('input-semanas-fijo').value) || 1;

            if (!inputNombre || inputNombre.trim() === "") { alert("Por favor, ingresa el Nombre."); return; }
            if (!inputTelefono || inputTelefono.trim() === "") { alert("Por favor, ingresa un teléfono."); return; }

            const btnGuardar = document.getElementById('btn-guardar-reserva');
            btnGuardar.innerText = "Guardando..."; btnGuardar.disabled = true;

            try {
                let promesas = [];
                let idGrupoFijo = "FIJO-" + Date.now();
                let fechaBase = new Date(`${fechaSeleccionada}T12:00:00`); 

                for(let i=0; i<semanas; i++) {
                    let fechaTurno = new Date(fechaBase);
                    fechaTurno.setDate(fechaTurno.getDate() + (i * 7));
                    
                    let anio = fechaTurno.getFullYear();
                    let mes = (fechaTurno.getMonth() + 1).toString().padStart(2, '0');
                    let dia = fechaTurno.getDate().toString().padStart(2, '0');
                    let fechaTurnoISO = `${anio}-${mes}-${dia}`;

                    promesas.push(addDoc(collection(db, "reservas"), { 
                        fecha: fechaTurnoISO, hora: reservaEnProcesoHora, cancha: selectCanchaModal, modalidad: modalidad,
                        jugador: inputNombre, telefono: inputTelefono,
                        duracion: duracionGlobal, 
                        fechaRegistro: new Date(), asistencia: false,
                        esFijo: true, grupoFijoId: idGrupoFijo
                    }));
                }
                
                await Promise.all(promesas);
                alert(`¡Turno Fijo creado con éxito por ${semanas} semanas!`);
                window.cerrarModalReservaCliente();
            } catch (error) { 
                alert("Hubo un error al guardar los turnos."); 
            } finally {
                btnGuardar.innerText = "Confirmar Turno Fijo"; btnGuardar.disabled = false;
            }
        }

        window.guardarConfiguracion = async function() {
            const inputPrimero = document.getElementById('input-primer-turno').value;
            const inputUltimo = document.getElementById('input-ultimo-turno').value;
            const inputPrecio = document.getElementById('input-precio').value;
            const inputCanchasNum = document.getElementById('input-canchas').value; 
            const inputDuracion = document.getElementById('input-duracion').value; 
            const inputEqF9 = document.getElementById('input-equiv-f9').value;
            const inputEqF11 = document.getElementById('input-equiv-f11').value;
            
            // Recoger los días seleccionados
            const checkboxesDias = document.querySelectorAll('.check-dia:checked');
            const diasSeleccionados = Array.from(checkboxesDias).map(cb => parseInt(cb.value));
            
            if(inputPrimero && inputUltimo && inputPrecio && inputCanchasNum && inputDuracion) {
                try { 
                    await setDoc(doc(db, "configuracion", "turnero"), { 
                        primerTurno: inputPrimero, ultimoTurno: inputUltimo, 
                        precioTurno: inputPrecio, canchas: inputCanchasNum,
                        duracionTurno: parseInt(inputDuracion),
                        equivF9: parseInt(inputEqF9) || 2,
                        equivF11: parseInt(inputEqF11) || 3,
                        diasAbiertos: diasSeleccionados
                    }); 
                    window.cerrarModalConfig();
                    alert("¡Configuración guardada!"); 
                } catch (error) { alert("Error al guardar."); }
            }
        }

        window.accionAsistencia = async function() { if(reservaSeleccionadaId) { await updateDoc(doc(db, "reservas", reservaSeleccionadaId), { asistencia: true }); window.cerrarModalAcciones(); } }
        window.accionEliminar = async function() { if(reservaSeleccionadaId && confirm("¿Estás seguro de cancelar ESTE partido?")) { await deleteDoc(doc(db, "reservas", reservaSeleccionadaId)); window.cerrarModalAcciones(); } }
        
        window.enviarWhatsApp = function() {
            if(reservaSeleccionadaId) {
                const res = reservasGlobales.find(r => r.id === reservaSeleccionadaId);
                if(res && res.telefono) {
                    let telFormateado = res.telefono.replace(/[^0-9+]/g, '');
                    let partesFecha = res.fecha.split('-');
                    let fechaAmigable = `${partesFecha[2]}/${partesFecha[1]}`;
                    
                    let mensaje = `Hola ${res.jugador}, te contactamos desde el complejo para confirmar tu partido (${res.modalidad || 'F7'}) el día ${fechaAmigable} a las ${res.hora} hs.`;
                    let url = `https://wa.me/${telFormateado}?text=${encodeURIComponent(mensaje)}`;
                    
                    window.open(url, '_blank');
                    window.cerrarModalAcciones();
                } else { alert("Esta reserva no tiene un número válido."); }
            }
        }

        onSnapshot(doc(db, "configuracion", "turnero"), (documento) => {
            if (documento.exists()) {
                primerTurno = documento.data().primerTurno || "18:00";
                ultimoTurno = documento.data().ultimoTurno || "23:00";
                precioGlobal = documento.data().precioTurno || "15000";
                cantidadCanchasGlobal = parseInt(documento.data().canchas) || 3; 
                duracionGlobal = parseInt(documento.data().duracionTurno) || 60; 
                equivF9Global = parseInt(documento.data().equivF9) || 2;
                equivF11Global = parseInt(documento.data().equivF11) || 3;
                diasAbiertosGlobal = documento.data().diasAbiertos || [1, 2, 3, 4, 5, 6, 0];
                
                document.getElementById('input-primer-turno').value = primerTurno;
                document.getElementById('input-ultimo-turno').value = ultimoTurno;
                document.getElementById('input-precio').value = precioGlobal;
                document.getElementById('input-canchas').value = cantidadCanchasGlobal;
                document.getElementById('input-duracion').value = duracionGlobal;
                document.getElementById('input-equiv-f9').value = equivF9Global;
                document.getElementById('input-equiv-f11').value = equivF11Global;
                
                document.querySelectorAll('.check-dia').forEach(cb => {
                    cb.checked = diasAbiertosGlobal.includes(parseInt(cb.value));
                });
            }

            // Asegurar que fechaSeleccionada no caiga en un día cerrado
            let partesF = fechaSeleccionada.split('-');
            let fActual = new Date(partesF[0], partesF[1] - 1, partesF[2]);
            if (!diasAbiertosGlobal.includes(fActual.getDay())) {
                let proximoAbierto = fechasValidas.find(fISO => {
                    let pf = fISO.split('-');
                    return diasAbiertosGlobal.includes(new Date(pf[0], pf[1] - 1, pf[2]).getDay());
                });
                if (proximoAbierto) fechaSeleccionada = proximoAbierto;
            }

            renderizarCalendarios(); 
            renderizarPantallas(); 
        });

        onSnapshot(collection(db, "reservas"), (snapshot) => {
            reservasGlobales = [];
            snapshot.forEach((doc) => reservasGlobales.push({ id: doc.id, ...doc.data() }));
            renderizarPantallas(); 
        });

        window.renderizarPantallas = function() {
            // Verificar si el día seleccionado está cerrado (por precaución)
            let partesF = fechaSeleccionada.split('-');
            let fSelec = new Date(partesF[0], partesF[1] - 1, partesF[2]);
            let diaCerrado = !diasAbiertosGlobal.includes(fSelec.getDay());

            const contenedorHorarios = document.getElementById('lista-horarios');
            const contenedorTurnero = document.getElementById('lista-reservas-turnero');
            
            contenedorHorarios.innerHTML = '';
            contenedorTurnero.innerHTML = '';

            if (diaCerrado) {
                contenedorHorarios.innerHTML = `<p style="text-align:center; color:#9ca3af; margin-top:20px;">El complejo está cerrado este día.</p>`;
                contenedorTurnero.innerHTML = `<p style="text-align:center; color:#9ca3af; margin-top:40px;">No hay actividad. Complejo cerrado.</p>`;
                return; // Salimos temprano para no renderizar la grilla
            }

            // 1. VISTA JUGADOR
            const horariosFiltrados = horariosBase.filter(h => h >= primerTurno && h <= ultimoTurno);
            const numBloquesNuevo = duracionGlobal / 30;

            horariosFiltrados.forEach(hora => {
                let bloquesNuevos = [];
                for(let b=0; b < numBloquesNuevo; b++) { bloquesNuevos.push(window.sumarMinutos(hora, b * 30)); }
                
                let canchasOcupadas = new Set();
                
                reservasGlobales.forEach(r => {
                    if ((r.fecha || fechasValidas[0]) === fechaSeleccionada) {
                        let resDuracion = r.duracion || 60;
                        let numBloquesRes = resDuracion / 30;
                        let bloquesRes = [];
                        for(let b=0; b < numBloquesRes; b++) { bloquesRes.push(window.sumarMinutos(r.hora, b * 30)); }
                        
                        if(bloquesNuevos.some(b => bloquesRes.includes(b))) { 
                            let baseCancha = parseInt(r.cancha || "1");
                            let cNecesarias = r.modalidad === 'F11' ? equivF11Global : (r.modalidad === 'F9' ? equivF9Global : 1);
                            for(let i=0; i<cNecesarias; i++) canchasOcupadas.add(baseCancha + i);
                        }
                    }
                });

                let canchasLibres = cantidadCanchasGlobal - canchasOcupadas.size;
                let hsTexto = duracionGlobal % 60 === 0 ? (duracionGlobal/60) : (duracionGlobal/60).toFixed(1);

                if (canchasLibres > 0) {
                    const div = document.createElement('div'); div.className = 'turno-item';
                    div.onclick = () => window.abrirModalReservaCliente(hora);
                    let textoCanchas = canchasLibres === 1 ? "1 F7 libre" : `${canchasLibres} F7 libres`;
                    div.innerHTML = `<span class="punto-verde"></span><span class="hora">${hora} hs | </span><span class="texto-disponible">Partido de ${hsTexto} hs</span><span class="texto-sillas-disp">${textoCanchas}</span>`;
                    contenedorHorarios.appendChild(div);
                }
            });

            // 2. VISTA TURNERO
            let reservasAMostrar = reservasGlobales.filter(r => (r.fecha || fechasValidas[0]) === fechaSeleccionada);
            let minActual = window.aMinutos(primerTurno);
            let minFin = window.aMinutos(ultimoTurno) + duracionGlobal; 
            if (minFin <= minActual) minFin += 1440; 

            let htmlGrilla = `<div class="contenedor-grilla">`;
            
            // Columna de Horarios
            htmlGrilla += `<div style="width: 55px; flex-shrink: 0; border-right: 1px solid #2c3540; background: #1e252d;">`;
            htmlGrilla += `<div style="height: 40px; border-bottom: 1px solid #2c3540; background: #242c36;"></div>`; 
            for (let m = minActual; m < minFin; m += 30) {
                let esHoraEnPunto = (m % 60 === 0);
                let hLabel = Math.floor(m / 60) % 24;
                let borderStyle = esHoraEnPunto ? 'border-bottom: 1px dashed rgba(255,255,255,0.05);' : 'border-bottom: 1px solid #2c3540;';
                let texto = esHoraEnPunto ? `${hLabel.toString().padStart(2, '0')}:00` : ``;
                htmlGrilla += `<div style="height: 40px; ${borderStyle} text-align: center; color: #9ca3af; font-size: 0.8em; padding-top: 3px; box-sizing: border-box;">${texto}</div>`;
            }
            htmlGrilla += `</div>`;

            // Columnas de Canchas
            for(let c = 1; c <= cantidadCanchasGlobal; c++) {
                htmlGrilla += `<div style="flex: 1; min-width: 140px; border-right: 1px solid #2c3540; position: relative;">`;
                htmlGrilla += `<div style="height: 40px; border-bottom: 1px solid #2c3540; text-align: center; line-height: 40px; font-weight: bold; background: #242c36; font-size: 0.9em;">Cancha ${c}</div>`;
                
                let reservasSilla = reservasAMostrar.filter(r => parseInt(r.cancha || "1") === c);
                let bloquesOcupadosColumna = new Set();
                
                reservasAMostrar.forEach(res => {
                    let baseCancha = parseInt(res.cancha || "1");
                    let cNecesarias = res.modalidad === 'F11' ? equivF11Global : (res.modalidad === 'F9' ? equivF9Global : 1);
                    if (c >= baseCancha && c < baseCancha + cNecesarias) {
                        let resDur = res.duracion || 60;
                        let numBloques = resDur / 30;
                        for(let b=0; b < numBloques; b++) { bloquesOcupadosColumna.add(window.sumarMinutos(res.hora, b * 30)); }
                    }
                });

                for (let m = minActual; m < minFin; m += 30) {
                    let esHoraEnPunto = (m % 60 === 0);
                    let borderStyle = esHoraEnPunto ? 'border-bottom: 1px dashed rgba(255,255,255,0.05);' : 'border-bottom: 1px solid #2c3540;';
                    let hLabel = Math.floor(m / 60) % 24;
                    let mLabel = m % 60;
                    let horaFormateada = `${hLabel.toString().padStart(2, '0')}:${mLabel.toString().padStart(2, '0')}`;

                    if (!bloquesOcupadosColumna.has(horaFormateada)) {
                        htmlGrilla += `<div class="celda-vacia-hover" style="height: 40px; ${borderStyle} box-sizing: border-box; cursor: pointer;" onclick="window.abrirModalReservaCliente('${horaFormateada}')"></div>`;
                    } else {
                        htmlGrilla += `<div style="height: 40px; ${borderStyle} box-sizing: border-box;"></div>`;
                    }
                }

                reservasSilla.forEach(res => {
                    let minRes = window.aMinutos(res.hora);
                    if (minRes < minActual && minFin > 1440) minRes += 1440;
                    
                    let offsetTop = ((minRes - minActual) / 30) * 40 + 40; 
                    let resDur = res.duracion || 60;
                    let height = (resDur / 30) * 40; 

                    let extraClass = res.asistencia ? "asistio" : "";
                    let colorTexto = res.asistencia ? "white" : "#171d24";
                    let modalidadBadge = res.modalidad || "F7";
                    
                    let numCanchasOcupa = res.modalidad === 'F11' ? equivF11Global : (res.modalidad === 'F9' ? equivF9Global : 1);
                    let cardWidth = `calc(${numCanchasOcupa * 100}% + ${numCanchasOcupa - 1}px - 8px)`;
                    
                    htmlGrilla += `
                        <div class="tarjeta-reserva-grilla ${extraClass}" onclick="window.abrirModal('${res.id}')" 
                             style="position: absolute; top: ${offsetTop}px; left: 4px; width: ${cardWidth}; height: ${height - 6}px; 
                                    padding: 8px; font-size: 0.85em; overflow: hidden; border-radius: 6px; cursor: pointer; 
                                    box-shadow: 0 4px 6px rgba(0,0,0,0.4); display: flex; flex-direction: column; z-index: 10;">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <span style="font-weight: 900; font-size: 1.1em; color: ${colorTexto}; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${res.jugador}</span>
                                <span style="background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.8em; color: ${colorTexto};">${modalidadBadge}</span>
                            </div>
                            <span style="margin-top: 4px; color: ${colorTexto}; opacity: 0.8; font-weight: 700;">${res.hora} hs ${res.esFijo ? '🔄 Fijo' : ''}</span>
                            <span style="margin-top: auto; font-size: 0.9em; font-weight: bold; color: ${colorTexto}; opacity: 0.9;">📱 ${res.telefono || 'Sin tel'}</span>
                        </div>
                    `;
                });
                htmlGrilla += `</div>`; 
            }
            htmlGrilla += `</div>`; 

            contenedorTurnero.innerHTML = htmlGrilla;
        }

        renderizarCalendarios();

    </script>
</body>
</html>
